async function computeATSResult(dateStr, idx) {
  const aScore = parseFloat(document.getElementById('score_a_' + idx)?.value);
  const hScore = parseFloat(document.getElementById('score_h_' + idx)?.value);
  if (isNaN(aScore) || isNaN(hScore)) return;

  try {
    const r = await store.get('archive_' + dateStr);
    if (!r) return;
    const data = JSON.parse(r.value);
    const g = data.games[idx];
    if (!g) return;

    // actual_margin: from fav's perspective (positive = fav covered)
    // Parse who the market fav is
    const mktMatch = (g.market_spread||'').match(/([A-Z]+)\s+([-+]?\d+\.?\d*)/);
    const mktFavAbbr = mktMatch ? mktMatch[1].toUpperCase() : null;
    const mktLine = mktMatch ? parseFloat(mktMatch[2]) : null;

    // Determine if fav is home or away by matching abbrev to team name
    const homeWords = g.home.toUpperCase().split(' ');
    const favIsHome = mktFavAbbr && (homeWords.some(function(w){ return w.startsWith(mktFavAbbr.slice(0,3)); }));
    const favScore = favIsHome ? hScore : aScore;
    const dogScore = favIsHome ? aScore : hScore;
    const actualMargin = favScore - dogScore; // positive = fav won outright

    // ATS: fav covered if actualMargin + mktLine > 0 (mktLine is negative for fav)
    let atsResult = 'P';
    if (mktLine !== null) {
      const covered = actualMargin + mktLine; // e.g. fav wins by 7, line -5 → 7-5=+2 = cover
      if (Math.abs(covered) < 0.1) atsResult = 'P';
      else if (g.verdict === 'EV_FAV') atsResult = covered > 0 ? 'W' : 'L';
      else if (g.verdict === 'EV_DOG') atsResult = covered < 0 ? 'W' : 'L';
      else atsResult = covered > 0 ? 'FAV_CVR' : 'DOG_CVR';
    }

    g.actual_away_score = aScore;
    g.actual_home_score = hScore;
    g.actual_margin = actualMargin;
    g.ats_result = atsResult;

    await store.set('archive_' + dateStr, JSON.stringify(data));

    // Update UI
    const marginEl = document.getElementById('margin_' + idx);
    const atsEl = document.getElementById('ats_' + idx);
    if (marginEl) marginEl.textContent = actualMargin.toFixed(1);
    if (atsEl) {
      atsEl.textContent = atsResult;
      atsEl.style.color = {W:'var(--green)',L:'var(--red)',P:'var(--text2)'}[atsResult]||'var(--text2)';
    }
    addLog('Result saved: game ' + idx + ' → ' + aScore + '-' + hScore + ' (ATS: ' + atsResult + ')', 'ok');
    updateSeasonRecord();
  } catch(e) { addLog('Result error: ' + e.message, 'err'); }
}

async function runPostmortem() {
  const btn = document.getElementById('runPostmortemBtn');
  const status = document.getElementById('postmortemStatus');
  const container = document.getElementById('postmortemContainer');
  btn.disabled = true; status.textContent = 'Analyzing...'; status.style.color = 'var(--amber)';
  container.innerHTML = '<div class="empty pulsing"><div class="empty-icon">🔬</div>Compiling full training dataset...<br>Running post-mortem analysis...</div>';

  try {
    // ── STEP 1: Collect ALL archived games with results ──────────────
    const keys = await store.list('archive_');
    const allGames = [];
    const datesSeen = new Set();
    for (const key of (keys.keys || []).sort()) { // sort = chronological
      const r = await store.get(key);
      if (!r) continue;
      const data = JSON.parse(r.value);
      datesSeen.add(data.date);
      (data.games || []).forEach(function(g) {
        if (g.actual_margin != null) {
          allGames.push(Object.assign({}, g, {
            date: data.date,
            weights_used: data.weights,
          }));
        }
      });
    }

    if (allGames.length < 3) {
      container.innerHTML = '<div class="empty"><div class="empty-icon">🔬</div>Need at least 3 games with results. Fetch scores from ESPN in the Results section above.</div>';
      btn.disabled = false; status.textContent = ''; return;
    }

    addLog('Post-mortem training set: ' + allGames.length + ' games across ' + datesSeen.size + ' dates', 'info');

    // ── STEP 2: Compute per-game errors ─────────────────────────────
    const errors = allGames.map(function(g) {
      const modelMatch = (g.model_spread || '').match(/([-+]?\d+\.?\d*)$/);
      const modelNum = modelMatch ? Math.abs(parseFloat(modelMatch[1])) : null;
      const modelError = (g.actual_margin != null && modelNum != null) ? (g.actual_margin - modelNum) : null;
      return {
        date: g.date,
        matchup: g.away + ' @ ' + g.home,
        event: g.event,
        market: g.market_spread,
        model: g.model_spread,
        actual_margin: g.actual_margin,
        model_error: modelError,
        verdict: g.verdict,
        ats_result: g.ats_result,
        components: g.components || {},
        weights_used: g.weights_used || {},
      };
    }).filter(function(e) { return e.model_error !== null; });

    // ── STEP 3: Aggregate component stats across ALL games ───────────
    const compKeys = ['base', 'efg', 'to', 'reb', 'ft', 'site', 'recency'];
    const compStats = {};
    compKeys.forEach(function(k) {
      const vals = errors.filter(function(e) { return e.components[k] != null; });
      if (!vals.length) return;
      const n = vals.length;
      const avgComp = vals.reduce(function(s,e){ return s + e.components[k]; }, 0) / n;
      const avgErr  = vals.reduce(function(s,e){ return s + e.model_error; }, 0) / n;
      const mae     = vals.reduce(function(s,e){ return s + Math.abs(e.model_error); }, 0) / n;
      const rmse    = Math.sqrt(vals.reduce(function(s,e){ return s + Math.pow(e.model_error, 2); }, 0) / n);
      // Pearson correlation between component value and model error
      const meanComp = avgComp;
      const meanErr = avgErr;
      const cov  = vals.reduce(function(s,e){ return s + (e.components[k]-meanComp)*(e.model_error-meanErr); }, 0) / n;
      const sdComp = Math.sqrt(vals.reduce(function(s,e){ return s + Math.pow(e.components[k]-meanComp,2); }, 0) / n);
      const sdErr  = Math.sqrt(vals.reduce(function(s,e){ return s + Math.pow(e.model_error-meanErr,2); }, 0) / n);
      const pearson = (sdComp > 0 && sdErr > 0) ? cov / (sdComp * sdErr) : 0;
      compStats[k] = {
        n, avgComp: +avgComp.toFixed(2), avgErr: +avgErr.toFixed(2),
        mae: +mae.toFixed(2), rmse: +rmse.toFixed(2), pearson: +pearson.toFixed(3),
        // Positive pearson: component tends to predict error direction (underweighted)
        // Negative pearson: component over-corrects (overweighted)
      };
    });

    // ── STEP 4: Load full post-mortem history + weight changelog ─────
    let pmHistory = [];
    try {
      const pmr = await store.get('postmortem_history');
      if (pmr) pmHistory = JSON.parse(pmr.value);
    } catch(e) {}

    let changelog = [];
    try {
      const clr = await store.get('weight_changelog');
      if (clr) changelog = JSON.parse(clr.value);
    } catch(e) {}

    // ── STEP 5: Back-fill mae_after and verdict on changelog entries ─
    // For each changelog entry, compute MAE on games that happened AFTER
    // that change was applied but BEFORE the next change (or now)
    if (changelog.length > 0) {
      const archiveKeys = await store.list('archive_');
      const allArchiveDates = (archiveKeys.keys || []).map(function(k){ return k.replace('archive_',''); }).sort();

      for (let ci = 0; ci < changelog.length; ci++) {
        const entry = changelog[ci];
        if (entry.mae_after != null) continue; // already computed
        const fromDate = entry.applied_at.slice(0, 10);
        const toDate   = ci + 1 < changelog.length ? changelog[ci+1].applied_at.slice(0,10) : '9999-12-31';

        const windowErrors = [];
        for (const dateStr of allArchiveDates) {
          if (dateStr <= fromDate || dateStr >= toDate) continue;
          const r = await store.get('archive_' + dateStr);
          if (!r) continue;
          const data = JSON.parse(r.value);
          (data.games || []).forEach(function(g) {
            if (g.actual_margin == null) return;
            const mm = (g.model_spread||'').match(/([-+]?\d+\.?\d*)$/);
            const mn = mm ? Math.abs(parseFloat(mm[1])) : null;
            if (mn != null) windowErrors.push(Math.abs(g.actual_margin - mn));
          });
        }
        if (windowErrors.length >= 3) {
          const maeAfter = windowErrors.reduce(function(s,e){ return s+e; },0) / windowErrors.length;
          entry.mae_after = +maeAfter.toFixed(3);
          entry.games_under_new_weights = windowErrors.length;
          if (entry.mae_before != null) {
            const improvement = entry.mae_before - maeAfter;
            entry.verdict = improvement > 0.15 ? 'IMPROVED' : improvement < -0.15 ? 'DEGRADED' : 'NEUTRAL';
          }
        }
      }
      // Persist updated changelog
      await store.set('weight_changelog', JSON.stringify(changelog));
    }

    // ── STEP 5b: Build weight changelog for prompt ────────────────────
    const weightHistory = pmHistory.map(function(pm) {
      return {
        date: pm.date,
        weights_applied: pm.weights_applied,
        mae_at_time: pm.mae_at_time,
        confidence: pm.result && pm.result.confidence,
      };
    });

    const changelogForPrompt = changelog.map(function(entry, i) {
      const deltas = Object.entries(entry.delta || {})
        .filter(function(e){ return e[1] !== 0; })
        .map(function(e){ return e[0] + (e[1]>0?'+':'')+e[1]; }).join(', ');
      return '#' + (i+1) + ' ' + entry.applied_at.slice(0,10) +
        ' [' + entry.source + ']' +
        ' changes: ' + (deltas || 'none') +
        ' | MAE before: ' + (entry.mae_before != null ? entry.mae_before + ' (' + entry.games_under_old_weights + ' games)' : 'no baseline') +
        ' | MAE after: ' + (entry.mae_after != null ? entry.mae_after + ' (' + entry.games_under_new_weights + ' games)' : 'pending') +
        (entry.verdict ? ' | VERDICT: ' + entry.verdict : '');
    });

    // Recent vs all-time MAE to see if we're improving
    const recentErrors = errors.slice(-Math.min(20, Math.floor(errors.length / 2)));
    const recentMAE = recentErrors.reduce(function(s,e){ return s + Math.abs(e.model_error); }, 0) / (recentErrors.length || 1);
    const allTimeMAE = errors.reduce(function(s,e){ return s + Math.abs(e.model_error); }, 0) / (errors.length || 1);
    const maeTrend = recentMAE < allTimeMAE ? 'IMPROVING' : recentMAE > allTimeMAE * 1.1 ? 'DEGRADING' : 'STABLE';

    // ── STEP 6: Build model prompt with full training context ─────────
    const cfg = await loadConfig();
    const currentWeights = Object.entries(cfg.weights).map(function(e){ return e[0]+':'+e[1].value+'%'; }).join(', ');
    const winsLosses = errors.filter(function(e){ return e.ats_result==='W'||e.ats_result==='L'; });
    const record = winsLosses.filter(function(e){ return e.ats_result==='W'; }).length + '-' + winsLosses.filter(function(e){ return e.ats_result==='L'; }).length;

    // Split game errors by date for temporal pattern detection
    const byDate = {};
    errors.forEach(function(e) {
      if (!byDate[e.date]) byDate[e.date] = [];
      byDate[e.date].push(e);
    });
    const dateMAEs = Object.entries(byDate).sort(function(a,b){ return a[0]<b[0]?-1:1; }).map(function(entry) {
      const dayErrors = entry[1];
      const dayMAE = dayErrors.reduce(function(s,e){ return s + Math.abs(e.model_error); }, 0) / dayErrors.length;
      const dayRecord = dayErrors.filter(function(e){ return e.ats_result==='W'; }).length + '-' + dayErrors.filter(function(e){ return e.ats_result==='L'; }).length;
      return entry[0] + ': MAE=' + dayMAE.toFixed(2) + ' record=' + dayRecord + ' n=' + dayErrors.length;
    });

    const prompt =
      'You are a quant analyst for a Las Vegas sportsbook refining a KenPom four-factor spread model.\n\n' +
      'TRAINING DATASET: ' + errors.length + ' games | ' + datesSeen.size + ' dates | RECORD: ' + record + ' ATS\n' +
      'ALL-TIME MAE: ' + allTimeMAE.toFixed(2) + ' pts | RECENT MAE (last ' + recentErrors.length + '): ' + recentMAE.toFixed(2) + ' pts | TREND: ' + maeTrend + '\n\n' +
      'COMPONENT STATS (full dataset, Pearson = correlation of component magnitude with prediction error):\n' +
      '  Positive Pearson → component systematically underweighted (model underestimates its impact)\n' +
      '  Negative Pearson → component overweighted (model overcorrects in this direction)\n' +
      JSON.stringify(compStats, null, 2) + '\n\n' +
      'DAILY MAE TREND:\n' + dateMAEs.join('\n') + '\n\n' +
      'ALL GAME ERRORS (chronological):\n' +
      errors.map(function(e){
        return e.date + ' | ' + e.matchup + ' | mkt:' + e.market + ' model:' + e.model +
          ' actual:' + (e.actual_margin != null ? e.actual_margin.toFixed(1) : '?') +
          ' err:' + (e.model_error != null ? e.model_error.toFixed(1) : '?') +
          ' ats:' + (e.ats_result||'?') +
          ' [base:' + (e.components.base||0).toFixed(1) +
          ' efg:' + (e.components.efg||0).toFixed(1) +
          ' to:' + (e.components.to||0).toFixed(1) +
          ' reb:' + (e.components.reb||0).toFixed(1) + ']';
      }).join('\n') + '\n\n' +
      (changelogForPrompt.length ? 'WEIGHT CHANGE CHANGELOG (chronological — use this to identify if recent changes caused MAE regression):\n' +
        '  Format: #N date [source] changes: deltas | MAE before: X (n games) | MAE after: Y (n games) | VERDICT\n' +
        '  VERDICT: IMPROVED = MAE dropped >0.15pts, DEGRADED = MAE rose >0.15pts, NEUTRAL = within 0.15pts, pending = not enough games yet\n' +
        changelogForPrompt.join('\n') + '\n\n' : '') +
      'CURRENT WEIGHTS: ' + currentWeights + '\n\n' +
      'Diagnose: which components are systematically biased? Show your reasoning from the Pearson correlations and daily trend.\n' +
      'Return ONLY this JSON:\n' +
      '{"summary":"2-3 sentence diagnosis referencing specific stats",' +
      '"component_analysis":{"base":"finding with data","efg":"finding with data","to":"finding with data","reb":"finding with data","ft":"finding with data"},' +
      '"weight_adjustments":{"base":0,"efg":0,"to":0,"reb":0,"ft":0,"context":0},' +
      '"adjustment_rationale":"specific reasoning from Pearson/MAE data",' +
      '"confidence":"LOW|MED|HIGH",' +
      '"mae_projection":"expected MAE after adjustment"}';

    const apiKey = getApiKey();
    const headers = { 'Content-Type': 'application/json' };
    if (apiKey) { headers['x-api-key'] = apiKey; headers['anthropic-version'] = '2023-06-01'; headers['anthropic-dangerous-direct-browser-access'] = 'true'; }

    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST', headers,
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 4000,
        system: 'You are a quantitative sports betting analyst. Cite specific numbers from the data. Return only valid compact JSON.',
        messages: [{ role: 'user', content: prompt }]
      })
    });
    if (!resp.ok) throw new Error('API error ' + resp.status);
    const d = await resp.json();
    addLog('Post-mortem API: in=' + d.usage?.input_tokens + ' out=' + d.usage?.output_tokens + ' tokens', 'info');
    let raw = ''; for (const b of d.content||[]) if (b.type==='text') raw += b.text;
    const s = raw.replace(/```json\s*/gi,'').replace(/```\s*/g,'').trim();
    const j1 = s.indexOf('{'), j2 = s.lastIndexOf('}');
    const out = JSON.parse(s.slice(j1, j2+1));

    // ── STEP 7: Archive this post-mortem ─────────────────────────────
    const pmEntry = {
      date: new Date().toISOString(),
      n_games: errors.length,
      n_dates: datesSeen.size,
      record,
      mae_at_time: allTimeMAE,
      recent_mae: recentMAE,
      mae_trend: maeTrend,
      compStats,
      result: out,
      weights_at_time: Object.fromEntries(Object.entries(cfg.weights).map(function(e){ return [e[0], e[1].value]; })),
      weights_applied: null, // filled in if user clicks Apply
    };
    pmHistory.push(pmEntry);
    await store.set('postmortem_history', JSON.stringify(pmHistory));
    const pmIdx = pmHistory.length - 1; // for Apply button reference

    // ── STEP 8: Render results ────────────────────────────────────────
    const confColor = {HIGH:'var(--green)',MED:'var(--amber)',LOW:'var(--text2)'}[out.confidence]||'var(--text2)';
    const adjRows = Object.entries(out.weight_adjustments||{}).map(function(entry) {
      const key = entry[0], newVal = entry[1];
      const curVal = (cfg.weights[key] && cfg.weights[key].value) || 0;
      const delta = newVal - curVal;
      const dColor = delta > 0 ? 'var(--green)' : delta < 0 ? 'var(--red)' : 'var(--text3)';
      const label = (cfg.weights[key] && cfg.weights[key].label) || key;
      return '<tr><td style="font-size:11px">' + label + '</td>' +
        '<td style="font-family:var(--mono);font-size:11px">' + curVal + '%</td>' +
        '<td style="font-family:var(--mono);font-size:11px;color:var(--blue)">' + newVal + '%</td>' +
        '<td style="font-family:var(--mono);font-size:11px;color:' + dColor + '">' + (delta>0?'+':'') + delta + '%</td></tr>';
    }).join('');

    const historyRows = pmHistory.slice(-5).reverse().map(function(pm, i) {
      const isLatest = i === 0;
      return '<tr style="' + (isLatest?'background:rgba(34,212,138,0.04)':'') + '">' +
        '<td style="font-family:var(--mono);font-size:10px">' + pm.date.slice(0,10) + '</td>' +
        '<td style="font-family:var(--mono);font-size:10px">' + pm.n_games + ' games / ' + pm.n_dates + ' days</td>' +
        '<td style="font-family:var(--mono);font-size:10px">' + (pm.mae_at_time||'—').toFixed ? pm.mae_at_time.toFixed(2) : '—' + '</td>' +
        '<td style="font-family:var(--mono);font-size:10px;color:' + ({HIGH:'var(--green)',MED:'var(--amber)',LOW:'var(--text2)'}[pm.result&&pm.result.confidence]||'var(--text3)') + '">' + (pm.result&&pm.result.confidence||'—') + '</td>' +
        '<td style="font-family:var(--mono);font-size:10px;color:var(--text3)">' + (pm.weights_applied ? '✓ Applied' : '—') + '</td>' +
        '</tr>';
    }).join('');

    const trendColor = {IMPROVING:'var(--green)',DEGRADING:'var(--red)',STABLE:'var(--text2)'}[maeTrend];

    container.innerHTML =
      // Header stats
      '<div style="display:flex;gap:20px;margin-bottom:16px;flex-wrap:wrap">' +
        '<div style="background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:10px 16px;text-align:center">' +
          '<div style="font-family:var(--mono);font-size:18px;font-weight:700;color:var(--text)">' + errors.length + '</div>' +
          '<div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em">Training Games</div></div>' +
        '<div style="background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:10px 16px;text-align:center">' +
          '<div style="font-family:var(--mono);font-size:18px;font-weight:700;color:var(--text)">' + allTimeMAE.toFixed(2) + ' pts</div>' +
          '<div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em">All-time MAE</div></div>' +
        '<div style="background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:10px 16px;text-align:center">' +
          '<div style="font-family:var(--mono);font-size:18px;font-weight:700;color:' + trendColor + '">' + maeTrend + '</div>' +
          '<div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em">Recent Trend</div></div>' +
        '<div style="background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:10px 16px;text-align:center">' +
          '<div style="font-family:var(--mono);font-size:18px;font-weight:700;color:var(--text)">' + record + '</div>' +
          '<div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em">ATS Record</div></div>' +
      '</div>' +
      // Diagnosis
      '<div style="margin-bottom:16px">' +
        '<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">' +
          '<span style="font-size:12px;font-weight:700;color:var(--text)">Diagnosis</span>' +
          '<span style="font-family:var(--mono);font-size:10px;color:' + confColor + ';border:1px solid ' + confColor + ';padding:2px 7px;border-radius:3px">' + (out.confidence||'?') + ' confidence</span>' +
          (out.mae_projection ? '<span style="font-family:var(--mono);font-size:10px;color:var(--text3)">Projected MAE → ' + out.mae_projection + '</span>' : '') +
        '</div>' +
        '<div style="font-size:12px;color:var(--text2);line-height:1.7;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:12px">' + (out.summary||'') + '</div>' +
      '</div>' +
      // Weight adjustments
      '<div style="margin-bottom:16px">' +
        '<div style="font-size:11px;font-weight:600;color:var(--text2);margin-bottom:8px;text-transform:uppercase;letter-spacing:.06em">Recommended Weight Adjustments</div>' +
        '<div class="table-scroll"><table class="data-table"><thead><tr><th>Component</th><th>Current</th><th>Recommended</th><th>Change</th></tr></thead><tbody>' + adjRows + '</tbody></table></div>' +
        '<div style="font-size:11px;color:var(--text3);margin-top:8px;line-height:1.6">' + (out.adjustment_rationale||'') + '</div>' +
      '</div>' +
      '<div style="display:flex;gap:8px;margin-bottom:20px">' +
        '<button class="btn-sm primary" onclick="applyRecommendedWeights(' + JSON.stringify(out.weight_adjustments) + ',' + pmIdx + ')">⚡ Apply Recommended Weights</button>' +
        '<button class="btn-sm" onclick="switchTab(\'model\')">View Weight Sliders</button>' +
      '</div>' +
      // Post-mortem history
      (pmHistory.length > 1 ?
        '<div>' +
          '<div style="font-size:11px;font-weight:600;color:var(--text2);margin-bottom:8px;text-transform:uppercase;letter-spacing:.06em">Post-Mortem History (last 5)</div>' +
          '<div class="table-scroll"><table class="data-table"><thead><tr><th>Date</th><th>Dataset</th><th>MAE</th><th>Confidence</th><th>Applied</th></tr></thead><tbody>' + historyRows + '</tbody></table></div>' +
        '</div>'
      : '');

    status.textContent = '✓ ' + errors.length + ' games · ' + datesSeen.size + ' dates'; status.style.color = 'var(--green)';
    addLog('Post-mortem #' + pmHistory.length + ': ' + errors.length + ' games, MAE=' + allTimeMAE.toFixed(2) + ' (' + maeTrend + '), ' + out.confidence + ' confidence', 'ok');

  } catch(e) {
    container.innerHTML = '<div class="empty"><div class="empty-icon">⚠️</div>' + e.message + '</div>';
    status.textContent = '✗ Error'; status.style.color = 'var(--red)';
    addLog('Post-mortem error: ' + e.message, 'err');
  }
  btn.disabled = false;
}


async function applyRecommendedWeights(adj, pmIdx) {
  if (!adj) return;
  const cfg = await loadConfig();
  let total = 0;
  for (const key of Object.keys(adj)) {
    if (cfg.weights[key]) total += adj[key];
  }
  if (Math.abs(total - 100) > 1) { addLog('Weight adjustment skipped — sums to ' + total + ', not 100', 'warn'); return; }

  // ── Snapshot weights BEFORE the change ──────────────────────────
  const weightsBefore = {};
  for (const key of Object.keys(cfg.weights)) weightsBefore[key] = cfg.weights[key].value;

  // ── Compute MAE on games played since the LAST weight change ────
  // (so we know the baseline this set of weights produced)
  let changelog = [];
  try {
    const clr = await store.get('weight_changelog');
    if (clr) changelog = JSON.parse(clr.value);
  } catch(e) {}
  const lastChange = changelog.length ? changelog[changelog.length - 1] : null;
  const lastChangeDateStr = lastChange ? lastChange.applied_at.slice(0, 10) : null;

  // Gather all archived games that occurred AFTER the last weight change
  let maeBeforeChange = null, gamesUnderCurrentWeights = 0;
  try {
    const archiveKeys = await store.list('archive_');
    const relevantErrors = [];
    for (const key of (archiveKeys.keys || []).sort()) {
      const dateStr = key.replace('archive_', '');
      if (lastChangeDateStr && dateStr < lastChangeDateStr) continue;
      const r = await store.get(key);
      if (!r) continue;
      const data = JSON.parse(r.value);
      (data.games || []).forEach(function(g) {
        if (g.actual_margin == null) return;
        const modelMatch = (g.model_spread || '').match(/([-+]?\d+\.?\d*)$/);
        const modelNum = modelMatch ? Math.abs(parseFloat(modelMatch[1])) : null;
        if (modelNum == null) return;
        relevantErrors.push(Math.abs(g.actual_margin - modelNum));
      });
    }
    if (relevantErrors.length > 0) {
      maeBeforeChange = relevantErrors.reduce(function(s, e){ return s + e; }, 0) / relevantErrors.length;
      gamesUnderCurrentWeights = relevantErrors.length;
    }
  } catch(e) {}

  // ── Apply the new weights ────────────────────────────────────────
  for (const key of Object.keys(adj)) {
    if (cfg.weights[key]) cfg.weights[key].value = adj[key];
  }
  await store.set('ncaab_config', JSON.stringify(cfg));

  // ── Write changelog entry ────────────────────────────────────────
  const changeEntry = {
    applied_at: new Date().toISOString(),
    source: pmIdx != null ? 'post_mortem_#' + (pmIdx + 1) : 'manual',
    weights_before: weightsBefore,
    weights_after: Object.fromEntries(Object.entries(adj)),
    mae_before: maeBeforeChange != null ? +maeBeforeChange.toFixed(3) : null,
    games_under_old_weights: gamesUnderCurrentWeights,
    mae_after: null,   // filled in by next post-mortem run
    games_under_new_weights: 0,
    verdict: null,     // 'IMPROVED' | 'DEGRADED' | 'NEUTRAL' — filled by next PM
    delta: Object.fromEntries(
      Object.entries(adj).map(function(e) { return [e[0], e[1] - (weightsBefore[e[0]] || 0)]; })
    ),
  };
  changelog.push(changeEntry);
  await store.set('weight_changelog', JSON.stringify(changelog));

  // ── Update post-mortem history entry ────────────────────────────
  if (pmIdx != null) {
    try {
      const pmr = await store.get('postmortem_history');
      if (pmr) {
        const pmHistory = JSON.parse(pmr.value);
        if (pmHistory[pmIdx]) { pmHistory[pmIdx].weights_applied = adj; }
        await store.set('postmortem_history', JSON.stringify(pmHistory));
      }
    } catch(e) {}
  }

  await initWeightEditor();
  addLog('Weights applied (changelog entry #' + changelog.length + '). Before MAE: ' +
    (maeBeforeChange != null ? maeBeforeChange.toFixed(2) + ' pts over ' + gamesUnderCurrentWeights + ' games' : 'no baseline yet'), 'ok');
  switchTab('model');
}

async function clearHistory() {
  if (!confirm('Clear all archived runs and pick history?')) return;
  try {
    const keys = await store.list('archive_');
    for (const key of (keys.keys || [])) await store.del(key);
    await store.del('last_postmortem');
    await store.del('postmortem_history');
    await store.del('weight_changelog');
    document.getElementById('archiveContainer').innerHTML = '<div class="empty"><div class="empty-icon">📦</div>No archived runs yet.</div>';
    document.getElementById('resultsEntryContainer').innerHTML = '<div style="font-size:11px;color:var(--text3)">Select a date above to enter results.</div>';

  } catch(e) { addLog('Clear error: ' + e.message, 'err'); }

// ─── WEIGHT EDITOR ───────────────────────────────────────────────
async function initWeightEditor(){
  const cfg=await loadConfig();
  const container=document.getElementById('weightEditor');
  container.innerHTML='';
  for(const key of Object.keys(DEFAULT_WEIGHTS)){
    const w=cfg.weights[key]||DEFAULT_WEIGHTS[key];
    const row=document.createElement('div'); row.className='weight-row';
    row.innerHTML=`<span class="weight-label">${w.label}</span><input type="range" class="weight-slider" id="w_${key}" min="0" max="50" value="${w.value}" oninput="updateWeightTotal()"><span class="weight-val" id="wv_${key}">${w.value}%</span>`;
    container.appendChild(row);
    row.querySelector('input').addEventListener('input',e=>{document.getElementById('wv_'+key).textContent=e.target.value+'%';});
  }
  updateWeightTotal();

  // Restore other config fields
  document.getElementById('evThreshold').value=cfg.evThreshold||1.5;
  document.getElementById('maxPlays').value=cfg.maxPlays||6;
  document.getElementById('gameScope').value=cfg.gameScope||'all';
  document.getElementById('emailTo').value=cfg.emailTo||'';
  document.getElementById('autoEmail').value=cfg.autoEmail||'ev_only';

  // Restore API key placeholder
  const storedKey=getApiKey();
  if(storedKey) document.getElementById('apiKeyStatus').textContent='✓ API key stored';

  renderWeightChangelog();
}
function updateWeightTotal(){
  let total=0;
  for(const key of Object.keys(DEFAULT_WEIGHTS)) total+=parseInt(document.getElementById('w_'+key)?.value||0);
  const el=document.getElementById('weightTotal');
  el.textContent=`Total: ${total}%`;
  el.className='weight-total '+(total===100?'ok':'bad');
}

// ─── EMAIL ───────────────────────────────────────────────────────
function buildEmailPreviewHTML(result,today){
  const picks=result.picks||[];
  const games=result.games||[];
  const subject=picks.length?`[NCAAB Scout] ${picks.length} EV Play${picks.length>1?'s':''} — ${today}`:`[NCAAB Scout] No EV Plays — ${today}`;
  const body=(result.emailContent||`NCAAB Line Scout — ${today}\n\nGames analyzed: ${games.length}\nEV plays: ${picks.length}\n\n`+picks.map(p=>`${p.play} | Edge: ${p.edge}pts | ${p.rationale}`).join('\n')||'No plays today.').replace(/\n/g,'<br>');
  return`<div class="ep-subject">${subject}</div><div>${body}</div>`;
}
async function sendEmailDigest(auto=false){
  const cfg=await loadConfig();
  const to=cfg.emailTo;
  if(!to){addLog('No recipient email configured','warn');document.getElementById('emailStatus').textContent='No recipient';return;}
  const emailStatus=document.getElementById('emailStatus');
  emailStatus.textContent=auto?'Auto-sending...':'Sending...';
  addLog(`Email sent to ${to} (simulated)`,'ok');
  emailStatus.textContent=`✓ Sent to ${to}`;
}

// ─── EXTERNAL DATA INJECTION via postMessage ─────────────────────
// Also accept data pushed via postMessage (e.g. from extension or companion page)
function handleInjectedData(event) {
  const d = event.data;
  if (!d || typeof d !== 'object') return;
  if (d.type === 'ncaab_espn' || d.type === 'espn_slate') {
    _espnRawGames = d.games || d.data || [];
    const status = document.getElementById('espnSlateStatus');
    if (status) { status.textContent = '✓ ' + _espnRawGames.length + ' games'; status.style.color = 'var(--green)'; }
    addLog('ESPN injected: ' + _espnRawGames.length + ' games', 'ok');
    applyESPNFilter();
  }
  if (d.type === 'ncaab_kenpom' || d.type === 'kenpom_stats') {
    const stats = d.stats || d.data || {};
    const count = Object.keys(stats).length;
    if (!count) return;
    _kenpomMemCache = stats; _kenpomMemDate = new Date().toDateString();
    store.set('kenpom_stats_' + _kenpomMemDate, JSON.stringify(stats)).catch(function(){});
    const status = document.getElementById('kenpomSyncStatus');
    if (status) { status.textContent = '✓ ' + count + ' teams'; status.style.color = 'var(--green)'; }
    addLog('KenPom injected: ' + count + ' teams', 'ok');
  }
}
window.addEventListener('message', handleInjectedData);

  const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent) || window.innerWidth < 640;

  initWeightEditor();

  checkKenpomCache();
  refreshArchivePicker();

    document.body.style.cssText = 'background:#0a0a0b;color:#f04060;font-family:monospace;padding:20px;';
    document.body.innerHTML = '<h2 style="color:#f04060;margin-bottom:16px">⚠ Init Error</h2><pre style="font-size:12px;line-height:1.7;white-space:pre-wrap">' + initErr.stack + '</pre><p style="margin-top:16px;color:#9090a0;font-size:12px">Open this file in Claude.ai instead, or check Model Config → API key.</p>';
  }
})();
