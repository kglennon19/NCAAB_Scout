<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NCAAB Line Scout — v3</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;500;600;700;800&display=swap');
  :root {
    --bg:#0a0a0b;--surface:#111113;--surface2:#18181c;--border:#222228;--border2:#2e2e38;
    --text:#f0f0f2;--text2:#9090a0;--text3:#55556a;
    --green:#22d48a;--green-dim:rgba(34,212,138,0.12);
    --amber:#f0a030;--amber-dim:rgba(240,160,48,0.12);
    --red:#f04060;--red-dim:rgba(240,64,96,0.12);
    --purple:#9b7fff;--purple-dim:rgba(155,127,255,0.12);
    --blue:#4499ff;--accent:#22d48a;
    --mono:'DM Mono',monospace;--sans:'Syne',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;overflow-x:hidden;}
  header{border-bottom:1px solid var(--border);padding:0 16px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:rgba(10,10,11,0.92);backdrop-filter:blur(12px);z-index:100;}
  .logo{font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase;display:flex;align-items:center;gap:8px;}
  .logo-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);flex-shrink:0;}
  .logo-version{font-size:9px;opacity:.5;letter-spacing:.08em;}
  .header-right{display:flex;align-items:center;gap:8px;}
  .status-chip{font-family:var(--mono);font-size:10px;padding:3px 8px;border-radius:3px;border:1px solid var(--border2);color:var(--text2);}
  .status-chip.live{border-color:var(--green);color:var(--green);}
  .container{max-width:1100px;margin:0 auto;padding:16px 16px 80px;}
  /* Tab bar — scrollable on mobile */
  .tabs{display:flex;gap:2px;margin-bottom:20px;border-bottom:1px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
  .tabs::-webkit-scrollbar{display:none;}
  .tab{font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;padding:10px 14px;cursor:pointer;color:var(--text3);border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .15s,border-color .15s;white-space:nowrap;flex-shrink:0;-webkit-tap-highlight-color:transparent;}
  .tab:hover{color:var(--text2);}
  .tab.active{color:var(--text);border-color:var(--green);}
  .tab-panel{display:none;}
  .tab-panel.active{display:block;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:12px;}
  .card-header{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
  .card-title{font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text2);}
  /* Buttons — min 44px touch target */
  .run-btn{background:var(--green);color:#000;border:none;padding:11px 18px;border-radius:6px;font-family:var(--sans);font-size:13px;font-weight:700;letter-spacing:.04em;cursor:pointer;transition:opacity .15s,transform .1s;display:flex;align-items:center;gap:8px;min-height:44px;-webkit-tap-highlight-color:transparent;}
  .run-btn:hover{opacity:.88;}.run-btn:active{transform:scale(.97);}.run-btn:disabled{opacity:.35;cursor:not-allowed;}
  .btn-sm{font-family:var(--sans);font-size:11px;font-weight:600;padding:8px 12px;border-radius:5px;cursor:pointer;border:1px solid var(--border2);background:var(--surface2);color:var(--text2);transition:color .15s,border-color .15s;min-height:36px;-webkit-tap-highlight-color:transparent;}
  .btn-sm:hover{color:var(--text);border-color:var(--text3);}
  .btn-sm.primary{background:var(--green-dim);border-color:var(--green);color:var(--green);}
  .btn-sm.primary:hover{background:rgba(34,212,138,0.2);}
  .btn-sm:disabled{opacity:.35;cursor:not-allowed;}
  .game-card{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:12px 14px;margin-bottom:8px;border-left:3px solid var(--border2);}
  .game-card.ev-fav{border-left-color:var(--green);}
  .game-card.ev-dog{border-left-color:var(--amber);}
  .game-card.ev-both{border-left-color:var(--purple);}
  .game-card.pass{border-left-color:var(--border2);}
  .game-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:10px;}
  .game-teams{flex:1;min-width:0;}
  .team-row{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600;line-height:1.6;overflow:hidden;}
  .seed-badge{font-size:10px;font-family:var(--mono);background:var(--surface);border:1px solid var(--border2);padding:1px 5px;border-radius:3px;color:var(--text2);flex-shrink:0;}
  .game-meta{font-size:10px;color:var(--text3);font-family:var(--mono);margin-top:2px;}
  .game-lines{text-align:right;flex-shrink:0;}
  .model-line{font-size:13px;font-weight:700;font-family:var(--mono);color:var(--text);}
  .mkt-line{font-size:10px;color:var(--text3);font-family:var(--mono);}
  .ev-badge{font-size:10px;font-weight:600;font-family:var(--mono);padding:2px 7px;border-radius:3px;margin-top:4px;display:inline-block;}
  .ev-green{background:var(--green-dim);color:var(--green);border:1px solid rgba(34,212,138,0.25);}
  .ev-amber{background:var(--amber-dim);color:var(--amber);border:1px solid rgba(240,160,48,0.25);}
  .ev-purple{background:var(--purple-dim);color:var(--purple);border:1px solid rgba(155,127,255,0.25);}
  .ev-gray{background:var(--surface);color:var(--text3);border:1px solid var(--border);}
  /* Stat grid — 2 cols on mobile, 4 on desktop */
  .stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:5px;margin-bottom:8px;}
  .stat-cell{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:6px 8px;}
  .stat-name{font-size:9px;font-family:var(--mono);color:var(--text3);margin-bottom:3px;letter-spacing:.06em;text-transform:uppercase;}
  .stat-val{font-size:11px;font-family:var(--mono);color:var(--text);}
  .stat-adv{font-size:9px;padding:1px 5px;border-radius:2px;margin-left:4px;}
  .adv-g{background:var(--green-dim);color:var(--green);}
  .adv-a{background:var(--amber-dim);color:var(--amber);}
  .adv-r{background:var(--red-dim);color:var(--red);}
  .adv-n{background:var(--surface2);color:var(--text3);}
  .tags{display:flex;gap:4px;flex-wrap:wrap;}
  .tag{font-size:10px;padding:2px 7px;border-radius:3px;font-family:var(--mono);}
  .tag-h{background:var(--amber-dim);color:var(--amber);}
  .tag-c{background:rgba(68,153,255,0.1);color:var(--blue);}
  .tag-r{background:var(--red-dim);color:var(--red);}
  .tag-n{background:var(--surface);color:var(--text3);border:1px solid var(--border);}
  .analysis-block{background:var(--surface);border:1px solid var(--border2);border-radius:5px;padding:10px 12px;font-size:12px;color:var(--text2);line-height:1.65;margin-top:8px;font-family:var(--mono);white-space:pre-wrap;word-break:break-word;}
  /* Tables — horizontal scroll on mobile */
  .table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;}
  .data-table{width:100%;border-collapse:collapse;font-size:12px;min-width:400px;}
  .data-table th{text-align:left;padding:8px 10px;font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);border-bottom:1px solid var(--border);font-family:var(--mono);}
  .data-table td{padding:9px 10px;border-bottom:1px solid var(--border);color:var(--text2);font-family:var(--mono);font-size:11px;}
  .data-table tr:last-child td{border-bottom:none;}
  .data-table tr:hover td{background:var(--surface2);}
  .win{color:var(--green);}.loss{color:var(--red);}.push{color:var(--text3);}.pending{color:var(--amber);}
  /* Weight editor — stack on mobile */
  .weight-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap;}
  .weight-label{font-size:11px;font-family:var(--mono);color:var(--text2);min-width:140px;flex-shrink:0;}
  .weight-slider{flex:1;min-width:80px;accent-color:var(--green);}
  .weight-val{font-size:11px;font-family:var(--mono);color:var(--green);width:38px;text-align:right;}
  .weight-total{font-size:11px;font-family:var(--mono);color:var(--text3);}
  .weight-total.ok{color:var(--green);}.weight-total.bad{color:var(--red);}
  /* Config rows — stack on mobile */
  .config-row{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap;}
  .config-label{font-size:11px;font-family:var(--mono);color:var(--text2);min-width:140px;}
  .config-input{flex:1;min-width:120px;background:var(--surface);border:1px solid var(--border2);color:var(--text);padding:8px 10px;border-radius:5px;font-family:var(--mono);font-size:12px;}
  .config-input:focus{outline:none;border-color:var(--green);}
  select.config-input option{background:var(--surface);}
  .log-area{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:14px;font-family:var(--mono);font-size:11px;color:var(--text3);height:240px;overflow-y:auto;line-height:1.7;}
  .log-line{display:block;}.log-line.info{color:var(--text2);}.log-line.ok{color:var(--green);}.log-line.warn{color:var(--amber);}.log-line.err{color:var(--red);}
  /* Summary bar — 3 cols on mobile */
  .summary-bar{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:16px;}
  .summary-stat{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:10px 12px;}
  .ss-label{font-size:9px;font-family:var(--mono);letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:4px;}
  .ss-val{font-size:18px;font-weight:800;color:var(--text);line-height:1;}
  .ss-sub{font-size:10px;font-family:var(--mono);color:var(--text3);margin-top:3px;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .spinner{width:14px;height:14px;border:2px solid rgba(255,255,255,0.1);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite;display:inline-block;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
  .pulsing{animation:pulse 1.5s ease-in-out infinite;}
  .section-label{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);font-family:var(--mono);margin:16px 0 10px;display:flex;align-items:center;gap:8px;}
  .section-label::after{content:'';flex:1;height:1px;background:var(--border);}
  .empty{text-align:center;padding:40px 20px;color:var(--text3);font-family:var(--mono);font-size:12px;line-height:2;}
  .empty-icon{font-size:28px;margin-bottom:8px;}
  .result-badge{padding:2px 8px;border-radius:3px;font-size:10px;font-weight:600;font-family:var(--mono);}
  .rb-w{background:var(--green-dim);color:var(--green);}
  .rb-l{background:var(--red-dim);color:var(--red);}
  .rb-p{background:var(--surface2);color:var(--text3);border:1px solid var(--border);}
  .rb-pending{background:var(--amber-dim);color:var(--amber);}
  .divider{height:1px;background:var(--border);margin:16px 0;}
  .email-preview{background:var(--surface);border:1px solid var(--border2);border-radius:6px;padding:16px;font-family:var(--mono);font-size:11px;color:var(--text2);line-height:1.8;max-height:240px;overflow-y:auto;}
  .ep-subject{font-size:12px;font-weight:600;color:var(--text);margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid var(--border);}
  /* Mobile bookmarklet banner */
  .mobile-sync-banner{display:none;background:var(--amber-dim);border:1px solid var(--amber);border-radius:6px;padding:12px 14px;margin-bottom:12px;font-size:11px;color:var(--amber);line-height:1.7;}
  /* Desktop-only: 4-col stat grid, 5-col summary */
  @media(min-width:640px){
    .container{padding:28px 28px 80px;}
    header{padding:0 28px;}
    .stat-grid{grid-template-columns:repeat(4,1fr);}
    .summary-bar{grid-template-columns:repeat(5,1fr);}
    .ss-val{font-size:22px;}
    .mobile-sync-banner{display:none!important;}
  }
  /* Mobile-specific overrides */
  @media(max-width:639px){
    .logo-version{display:none;}
    .run-btn span:last-child{display:none;} /* hide "Run Daily Analysis" text, keep icon */
    .run-btn{padding:11px 14px;}
    .card-header{gap:6px;}
    .mobile-sync-banner{display:block;}
    /* Hide desktop-only header chips on very small screens */
    .status-chip:not(.live){font-size:9px;padding:2px 5px;}
    textarea{font-size:13px!important;} /* prevent iOS zoom on focus */
    input[type=number],input[type=email],input[type=password]{font-size:16px!important;} /* prevent iOS zoom */
    select{font-size:16px!important;}
  }
</head>
<body>

<header>
  <div class="logo"><div class="logo-dot"></div>NCAAB LINE SCOUT <span class="logo-version">V3</span></div>
  <div class="header-right">
    <span class="status-chip" id="lastRunChip">NEVER RUN</span>
    <button class="run-btn" id="mainRunBtn" onclick="runAgent()">
      <span id="runBtnIcon">▶</span><span id="runBtnText">Run Daily Analysis</span>
    </button>
  </div>
</header>

<div class="container">
  <div class="tabs">
    <div class="tab active" onclick="switchTab('today')">Today's Lines</div>
    <div class="tab" onclick="switchTab('slate')">Game Slate</div>
    <div class="tab" onclick="switchTab('history')">Performance</div>
    <div class="tab" onclick="switchTab('model')">Model Config</div>
    <div class="tab" onclick="switchTab('email')">Email</div>
    <div class="tab" onclick="switchTab('log')">Run Log</div>
  </div>

  <!-- TODAY -->
  <div class="tab-panel active" id="tab-today">
    <div class="summary-bar" id="summaryBar">
      <div class="summary-stat"><div class="ss-label">Games Today</div><div class="ss-val" id="ss-games">—</div><div class="ss-sub">scanned</div></div>
      <div class="summary-stat"><div class="ss-label">EV Plays</div><div class="ss-val" id="ss-plays" style="color:var(--green)">—</div><div class="ss-sub">≥1.5 pts edge</div></div>
      <div class="summary-stat"><div class="ss-label">Top Edge</div><div class="ss-val" id="ss-top" style="color:var(--amber)">—</div><div class="ss-sub">pts vs market</div></div>
      <div class="summary-stat"><div class="ss-label">Season Record</div><div class="ss-val" id="ss-record">—</div><div class="ss-sub">ATS this season</div></div>
      <div class="summary-stat"><div class="ss-label">ROI</div><div class="ss-val" id="ss-roi">—</div><div class="ss-sub">vs −110 juice</div></div>
    </div>
    <div id="gamesContainer">
      <div class="empty"><div class="empty-icon">🏀</div>No analysis run yet.<br>Hit <strong>Run Daily Analysis</strong> to scan today's slate.</div>
    </div>
  </div>


  <!-- SLATE -->
  <div class="tab-panel" id="tab-slate">
    <div class="card" style="margin-bottom:12px">
      <div class="card-header">
        <span class="card-title">Data Sources</span>
      </div>
      <!-- Mobile sync instructions injected by JS into console script boxes -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
        <div>
          <div style="font-size:11px;font-weight:600;color:var(--text2);margin-bottom:6px">📊 KenPom Four Factors</div>
          <div style="font-size:11px;color:var(--text3);line-height:1.6;margin-bottom:10px">Generates a console script. Paste it in your KenPom tab → 365 teams sync here instantly. Run once per session.</div>
          <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
            <button class="btn-sm primary" id="syncKenpomBtn" onclick="syncKenpom()">⟳ Sync KenPom</button>
            <button class="btn-sm" onclick="checkKenpomCache()">Check Cache</button>
            <span id="kenpomSyncStatus" style="font-size:10px;font-family:var(--mono);color:var(--text3)">Not synced</span>
          </div>
        </div>
        <div>
          <div style="font-size:11px;font-weight:600;color:var(--text2);margin-bottom:6px">📡 ESPN Slate + Lines</div>
          <div style="font-size:11px;color:var(--text3);line-height:1.6;margin-bottom:10px">Generates a console script. Paste it in your ESPN scoreboard tab → live lines sync here instantly.</div>
          <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
            <button class="btn-sm primary" id="syncESPNBtn" onclick="syncESPNSlate()">⟳ Sync ESPN</button>
            <span id="espnSlateStatus" style="font-size:10px;font-family:var(--mono);color:var(--text3)">Not synced</span>
          </div>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-header">
        <span class="card-title">Today's Game Slate</span>
        <div style="display:flex;gap:8px;align-items:center">
          <button class="btn-sm" onclick="clearSlate()">Clear</button>
        </div>
      </div>
      <div style="font-size:11px;font-family:var(--mono);color:var(--text3);margin-bottom:12px;line-height:1.7">
        Loaded from <strong style="color:var(--text2)">ESPN scoreboard</strong> via popup sync — live lines, event labels, neutral site flags.<br>
        Filter: <span id="espnFilterDesc" style="color:var(--text2)">tournament · lines available · upcoming</span> &nbsp;·&nbsp; Edit any line manually before running.<br>
        Format: <span style="color:var(--text3)">Away @ Home | Event | Time ET | Spread | Total</span>
      </div>
      <textarea id="slateInput" class="config-input" rows="14" style="width:100%;font-size:11px;line-height:1.8;resize:vertical" placeholder="Click 'Sync ESPN' above to pull today's slate automatically..."></textarea>
      <div style="margin-top:10px;display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <button class="btn-sm primary" onclick="runAgentFromSlate()">▶ Run Model on This Slate</button>
        <label style="display:flex;align-items:center;gap:5px;font-size:11px;font-family:var(--mono);color:var(--text3);cursor:pointer">
          <input type="checkbox" id="filterTourney" checked onchange="applyESPNFilter()" style="accent-color:var(--green)"> Tournament only
        </label>
        <label style="display:flex;align-items:center;gap:5px;font-size:11px;font-family:var(--mono);color:var(--text3);cursor:pointer">
          <input type="checkbox" id="filterOddsOnly" checked onchange="applyESPNFilter()" style="accent-color:var(--green)"> Lines available
        </label>
        <label style="display:flex;align-items:center;gap:5px;font-size:11px;font-family:var(--mono);color:var(--text3);cursor:pointer">
          <input type="checkbox" id="filterPreOnly" checked onchange="applyESPNFilter()" style="accent-color:var(--green)"> Upcoming only
        </label>
        <span style="font-size:10px;font-family:var(--mono);color:var(--text3)" id="slateStatus"></span>
      </div>
    </div>
  </div>

  <!-- HISTORY / PERFORMANCE -->
  <div class="tab-panel" id="tab-history">

    <!-- Daily Archives -->
    <div class="card" style="margin-bottom:12px">
      <div class="card-header">
        <span class="card-title">Daily Archives</span>
        <div style="display:flex;gap:8px">
          <select id="archiveDatePicker" class="config-input" style="max-width:180px;font-size:11px" onchange="loadArchiveDay(this.value)">
            <option value="">— Select date —</option>
          </select>
          <button class="btn-sm" onclick="clearHistory()">Clear All</button>
        </div>
      </div>
      <div id="archiveContainer"><div class="empty"><div class="empty-icon">📦</div>No archived runs yet. Archives save automatically after each model run.</div></div>
    </div>

    <!-- Results Entry -->
    <div class="card" style="margin-bottom:12px">
      <div class="card-header">
        <span class="card-title">Results</span>
        <div style="display:flex;gap:8px;align-items:center">
          <span style="font-size:10px;font-family:var(--mono);color:var(--text3)" id="resultsDateLabel"></span>
          <span id="fetchResultsStatus" style="font-size:10px;font-family:var(--mono);color:var(--text3)"></span>
          <button class="btn-sm primary" id="fetchResultsBtn" onclick="fetchResults()">📡 Fetch from ESPN</button>
        </div>
      </div>
      <div style="font-size:11px;color:var(--text2);margin-bottom:12px;line-height:1.7">
        Pulls final scores automatically from ESPN. Select an archive date, then click <strong>Fetch from ESPN</strong> — paste the script in your ESPN scoreboard tab console to auto-populate all results.
      </div>
      <div id="resultsEntryContainer"><div style="font-size:11px;color:var(--text3)">Select a date above to view and fetch results.</div></div>
    </div>

    <!-- Post-Mortem -->
    <div class="card" style="margin-bottom:12px">
      <div class="card-header">
        <span class="card-title">Post-Mortem Analysis</span>
        <div style="display:flex;gap:8px;align-items:center">
          <span id="postmortemStatus" style="font-size:10px;font-family:var(--mono);color:var(--text3)"></span>
          <button class="btn-sm primary" id="runPostmortemBtn" onclick="runPostmortem()">▶ Run Post-Mortem</button>
        </div>
      </div>
      <div style="font-size:11px;color:var(--text2);margin-bottom:12px;line-height:1.7">
        Analyzes prediction errors across all archived games with results. Identifies which model components are systematically over- or under-weighted and recommends weight adjustments.
      </div>
      <div id="postmortemContainer"><div class="empty"><div class="empty-icon">🔬</div>Enter results for at least one archived date, then run post-mortem.</div></div>
    </div>

    <!-- Season Record -->
    <div class="card">
      <div class="card-header"><span class="card-title">Season Record</span></div>
      <div style="display:flex;gap:24px;align-items:center;flex-wrap:wrap">
        <div style="text-align:center"><div style="font-size:28px;font-weight:800;font-family:var(--mono);color:var(--green)" id="ss-wins">0</div><div style="font-size:10px;color:var(--text3);letter-spacing:.06em;text-transform:uppercase">Wins</div></div>

<script>
// ─── STATE ───────────────────────────────────────────────────────
let state = { running:false, lastRun:null, todayGames:[], todayPicks:[], emailContent:null };

// ─── WEIGHTS ─────────────────────────────────────────────────────
const DEFAULT_WEIGHTS = {
  efficiency: { label:'AdjEM / Base Efficiency (KenPom)', value:20 },
  efg:        { label:'eFG% matchup (Four Factor #1)',    value:15 },
  turnover:   { label:'TO rate matchup (Four Factor #2)', value:15 },
  rebounding: { label:'ORB%/DRB% (Four Factor #3)',       value:15 },
  freethrows: { label:'FTA/FGA + FT% (Four Factor #4)',   value:15 },
  context:    { label:'Recency (last-10 AdjEM momentum)',    value:20 },
};

// ─── STORAGE POLYFILL ────────────────────────────────────────────
const store = {
  async get(key) {
    try { if(window.storage){ const r=await window.storage.get(key); return r?{value:r.value}:null; } } catch(e){}
    try { const v=localStorage.getItem('ncaab_'+key); return v?{value:v}:null; } catch(e){ return null; }
  },
  async set(key,value) {
    try { if(window.storage){ await window.storage.set(key,value); return; } } catch(e){}
    try { localStorage.setItem('ncaab_'+key,value); } catch(e){}
  },
  async del(key) {
    try { if(window.storage) await window.storage.delete(key); } catch(e){}
    try { localStorage.removeItem('ncaab_'+key); } catch(e){}
  },
  async list(prefix) {
    // claude.ai path
    try { if(window.storage){ const r=await window.storage.list(prefix); return r||{keys:[]}; } } catch(e){}
    // localStorage path: scan all keys with our namespace prefix
    try {
      const keys=[];
      for(let i=0;i<localStorage.length;i++){
        const k=localStorage.key(i);
        if(k&&k.startsWith('ncaab_'+(prefix||''))){ keys.push(k.replace('ncaab_','')); }
      }
      return {keys};
    } catch(e){ return {keys:[]}; }
  }
};

// ─── CONFIG ──────────────────────────────────────────────────────
async function loadConfig() {
  try { const r=await store.get('model_config'); if(r) return JSON.parse(r.value); } catch(e){}
  return {weights:DEFAULT_WEIGHTS,evThreshold:1.5,maxPlays:6,gameScope:'all',emailTo:'',autoEmail:'ev_only'};
}
async function saveConfig() {
  // Snapshot current weights before saving for changelog
  const cfgBefore = await loadConfig();
  const weightsBefore = {};
  for (const key of Object.keys(DEFAULT_WEIGHTS)) weightsBefore[key] = (cfgBefore.weights[key] && cfgBefore.weights[key].value) || 0;

  const weights = {};
  for (const key of Object.keys(DEFAULT_WEIGHTS)) {
    weights[key] = {...DEFAULT_WEIGHTS[key], value: parseInt(document.getElementById('w_'+key)?.value || DEFAULT_WEIGHTS[key].value)};
  }
  const cfg = {weights, evThreshold: parseFloat(document.getElementById('evThreshold').value), maxPlays: parseInt(document.getElementById('maxPlays').value), gameScope: document.getElementById('gameScope').value, emailTo: document.getElementById('emailTo').value, autoEmail: document.getElementById('autoEmail').value};
  await store.set('model_config', JSON.stringify(cfg));

  // Log to changelog if weights actually changed
  const weightsAfter = {};
  for (const key of Object.keys(DEFAULT_WEIGHTS)) weightsAfter[key] = weights[key].value;
  const delta = {};
  let anyChange = false;
  for (const key of Object.keys(weightsAfter)) {
    const d = weightsAfter[key] - (weightsBefore[key] || 0);
    if (d !== 0) { delta[key] = d; anyChange = true; }
  }
  if (anyChange) {
    try {
      let changelog = [];
      const clr = await store.get('weight_changelog');
      if (clr) changelog = JSON.parse(clr.value);
      changelog.push({
        applied_at: new Date().toISOString(),
        source: 'manual',
        weights_before: weightsBefore, weights_after: weightsAfter, delta,
        mae_before: null, mae_after: null, games_under_old_weights: 0, games_under_new_weights: 0, verdict: null,
      });
      await store.set('weight_changelog', JSON.stringify(changelog));
      addLog('Manual weight change logged (entry #' + changelog.length + ')', 'info');
      renderWeightChangelog();
    } catch(e) {}
  }
  addLog('Config saved ✓', 'ok'); alert('Config saved.');
}

async function renderWeightChangelog() {
  const container = document.getElementById('weightChangelogContainer');
  if (!container) return;
  try {
    const clr = await store.get('weight_changelog');
    if (!clr) { container.innerHTML = '<div style="font-size:11px;color:var(--text3)">No changes logged yet.</div>'; return; }
    const changelog = JSON.parse(clr.value);
    if (!changelog.length) { container.innerHTML = '<div style="font-size:11px;color:var(--text3)">No changes logged yet.</div>'; return; }
    const rows = changelog.slice().reverse().map(function(entry) {
      const verdictColor = {IMPROVED:'var(--green)',DEGRADED:'var(--red)',NEUTRAL:'var(--text2)'}[entry.verdict] || 'var(--text3)';
      const deltas = Object.entries(entry.delta || {}).filter(function(e){ return e[1] !== 0; })
        .map(function(e){ return '<span style="color:' + (e[1]>0?'var(--green)':'var(--red)') + '">' + e[0] + (e[1]>0?'+':'') + e[1] + '%</span>'; }).join(' ');
      const maeStr = entry.mae_before != null
        ? entry.mae_before.toFixed(2) + ' → ' + (entry.mae_after != null ? entry.mae_after.toFixed(2) : '⏳') + ' pts'
        : '⏳';
      return '<tr>' +
        '<td style="font-family:var(--mono);font-size:10px;color:var(--text3)">' + entry.applied_at.slice(0,10) + '</td>' +
        '<td style="font-family:var(--mono);font-size:10px;color:var(--text3)">' + entry.source + '</td>' +
        '<td style="font-size:10px">' + (deltas || '—') + '</td>' +
        '<td style="font-family:var(--mono);font-size:10px">' + maeStr + '</td>' +
        '<td style="font-family:var(--mono);font-size:10px;font-weight:700;color:' + verdictColor + '">' + (entry.verdict || '⏳') + '</td>' +
        '</tr>';
    }).join('');
    container.innerHTML = '<div class="table-scroll"><table class="data-table"><thead><tr><th>Date</th><th>Source</th><th>Δ Weights</th><th>MAE Before→After</th><th>Verdict</th></tr></thead><tbody>' + rows + '</tbody></table></div>' +
      '<div style="font-size:10px;font-family:var(--mono);color:var(--text3);margin-top:6px">⏳ = awaiting games under new weights</div>';
  } catch(e) { container.innerHTML = '<div style="font-size:11px;color:var(--text3)">Error: ' + e.message + '</div>'; }
}

// ─── LOG ─────────────────────────────────────────────────────────
function addLog(msg,level='info') {
  const area=document.getElementById('logArea');
  const ts=new Date().toLocaleTimeString();
  const line=document.createElement('span');
  line.className='log-line '+(level||'info');
  line.textContent=`[${ts}] ${msg}`;
  area.appendChild(line); area.appendChild(document.createElement('br'));
  area.scrollTop=area.scrollHeight;
  console.log(`[NCAAB ${level}] ${msg}`);
}
function clearLog(){ document.getElementById('logArea').innerHTML=''; }

// ─── TAB SWITCHER ────────────────────────────────────────────────
function switchTab(name) {
  const order=['today','slate','history','model','email','log'];
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',order[i]===name));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.toggle('active',p.id==='tab-'+name));
  if(name==='history') renderHistoryFromStorage();
}

// ─── SUMMARY BAR ─────────────────────────────────────────────────
function updateSummaryFromData(result) {
  const games=result.games||[], picks=result.picks||[];
  document.getElementById('ss-games').textContent=games.length||'0';
  document.getElementById('ss-plays').textContent=picks.length||'0';
  const edges=games.map(g=>parseFloat(g.edge_pts)||0).filter(Boolean);
  document.getElementById('ss-top').textContent=edges.length?Math.max(...edges).toFixed(1)+'pts':'—';
  updateSeasonRecord();
}
async function updateSeasonRecord() {
  try {
    const keys = await store.list('archive_');
    let w = 0, l = 0, push = 0;
    for (const key of (keys.keys || [])) {
      const r = await store.get(key);
      if (!r) continue;
      const data = JSON.parse(r.value);
      (data.games || []).forEach(function(g) {
        if (g.ats_result === 'W') w++;
        else if (g.ats_result === 'L') l++;
        else if (g.ats_result === 'P') push++;
      });
    }
    const total = w + l + push;
    const record = w + '-' + l + (push ? '-' + push : '');
    document.getElementById('ss-wins').textContent = w;
    document.getElementById('ss-losses').textContent = l;
    document.getElementById('ss-pushes').textContent = push;
    const roi = total > 0 ? ((w * 0.909 - l) / total * 100).toFixed(1) + '%' : '—';
    document.getElementById('ss-roi').textContent = roi;
    const recEl = document.getElementById('ss-record');
    if (recEl) recEl.textContent = record;
  } catch(e) {}
}

// ─── KENPOM SYNC ─────────────────────────────────────────────────
// Sandboxed iframe: no popups, no cross-origin fetch.
// Sync via console scripts pasted in the target site tab.
// BroadcastChannel delivers data back — works cross-tab, same browser.

// In-memory cache (survives within session even if storage fails)
let _kenpomMemCache = null;
let _kenpomMemDate  = null;

// ─── MAR 13 2026 BOOTSTRAP CACHE ─────────────────────────────────
// Live-scraped from kenpom.com this session. Covers all 14 ESPN games today
// + next-round bracket teams. Auto-loaded so agent runs without any sync.
// Auto-load bootstrap on Mar 13 so agent works immediately



// KenPom console scraper — paste this in the browser console on kenpom.com
const KENPOM_SCRAPER = `(async()=>{function p(html,cm){const doc=new DOMParser().parseFromString(html,'text/html'),res={};doc.querySelectorAll('table tbody tr').forEach(row=>{const c=Array.from(row.querySelectorAll('td')).map(td=>td.textContent.trim());const a=row.querySelector('a');const t=a?a.textContent.trim():c[cm._tc??0];if(!t||t.length<2)return;const e={};for(const[f,i]of Object.entries(cm)){if(f!=='_tc')e[f]=parseFloat(c[i])||null;}res[t]=e;});return res;}try{const[mh,fh,rh]=await Promise.all([fetch('/').then(r=>r.text()),fetch('/stats.php').then(r=>r.text()),fetch('/recent.php').then(r=>r.text())]);const m=p(mh,{_tc:1,wl:3,adjEM:4,adjO:5,adjD:7,adjT:9,luck:11});const f=p(fh,{_tc:0,adjT:2,adjOE:4,efg_off:6,to_off:8,orb:10,ftr_off:12,adjDE:14,efg_def:16,to_def:18,drb:20,ftr_def:22});const r=p(rh,{_tc:0,recent_adjEM:4,recent_adjO:6,recent_adjD:8});const merged={};for(const t of new Set([...Object.keys(m),...Object.keys(f)])){const mv=m[t]||{},fv=f[t]||{},rv=r[t]||{};merged[t]={wl:mv.wl,adjEM:mv.adjEM,adjO:mv.adjO,adjD:mv.adjD,luck:mv.luck,adjT:fv.adjT||mv.adjT,adjOE:fv.adjOE,adjDE:fv.adjDE,efg_off:fv.efg_off,efg_def:fv.efg_def,to_off:fv.to_off,to_def:fv.to_def,orb:fv.orb,drb:fv.drb,ftr_off:fv.ftr_off,ftr_def:fv.ftr_def,recent_adjEM:rv.recent_adjEM,recent_adjO:rv.recent_adjO,recent_adjD:rv.recent_adjD};}const bc=new BroadcastChannel('kenpom_sync');bc.postMessage({type:'kenpom_stats',date:new Date().toDateString(),count:Object.keys(merged).length,data:merged});bc.close();console.log('KenPom synced:',Object.keys(merged).length,'teams — recent data included');}catch(e){const bc=new BroadcastChannel('kenpom_sync');bc.postMessage({type:'kenpom_error',message:e.message});bc.close();}})();`;

// ESPN console scraper — paste this in the browser console on espn.com/mens-college-basketball/scoreboard
const ESPN_SCRAPER = `(function(){try{const sb=window.__espnfitt__?.page?.content?.scoreboard;if(!sb?.evts)throw new Error('No scoreboard data');const games=sb.evts.map(e=>{const comps=e.competitors||[];const home=comps.find(c=>c.isHome)||comps[1]||{};const away=comps.find(c=>!c.isHome)||comps[0]||{};const odds=e.odds&&typeof e.odds==='object'&&!Array.isArray(e.odds)?e.odds:null;const dt=new Date(e.date);const time=dt.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',timeZone:'America/New_York'})+' ET';const note=(e.note||'').replace(/^Phillips 66 /,'')..replace(/^T[. ]*Rowe Price /,'');return{id:e.id,away:away.displayName||away.name||'?',awayRank:away.rank<=25?away.rank:null,awayRecord:away.records?.[0]?.summary,home:home.displayName||home.name||'?',homeRank:home.rank<=25?home.rank:null,homeRecord:home.records?.[0]?.summary,neutral:!!e.neutral,event:note||'NCAAB',time,state:e.status?.state,spread:odds?.details||null,total:typeof odds?.overUnder==='number'?String(odds.overUnder):null,isTourney:!!(e.note&&(e.note.includes('Tournament')||e.note.includes('Championship')));};});const bc=new BroadcastChannel('espn_sync');bc.postMessage({type:'espn_slate',count:games.length,data:games});bc.close();console.log('ESPN synced:',games.length,'games');}catch(err){const bc=new BroadcastChannel('espn_sync');bc.postMessage({type:'espn_error',message:err.message});bc.close();}})();`;

// ESPN results scraper — paste in ESPN scoreboard console, returns all game scores
const ESPN_RESULTS_SCRAPER = `(function(){try{const evts=window.__espnfitt__?.page?.content?.scoreboard?.evts||[];const results=evts.map(e=>{const comps=e.competitors||[];const home=comps.find(c=>c.isHome)||comps[1]||{};const away=comps.find(c=>!c.isHome)||comps[0]||{};return{id:e.id,away:away.displayName||away.name||'?',awayScore:away.score!=null?Number(away.score):null,home:home.displayName||home.name||'?',homeScore:home.score!=null?Number(home.score):null,state:e.status?.state,final:e.status?.description};});const bc=new BroadcastChannel('espn_results');bc.postMessage({type:'espn_results',data:results});bc.close();console.log('ESPN results sent:',results.filter(r=>r.state==='post').length,'final games');}catch(err){const bc=new BroadcastChannel('espn_results');bc.postMessage({type:'espn_results_error',message:err.message});bc.close();}})();`;

let _resultsChannel = null;

function fetchResults() {
  const dateStr = window.__currentArchiveDate;
  if (!dateStr) { addLog('Select an archive date first', 'warn'); return; }
  const btn = document.getElementById('fetchResultsBtn');
  const status = document.getElementById('fetchResultsStatus');
  btn.disabled = true; btn.textContent = '⏳ Waiting...';
  if (_resultsChannel) { _resultsChannel.close(); _resultsChannel = null; }
  _resultsChannel = new BroadcastChannel('espn_results');
  _resultsChannel.onmessage = async function(e) {
    _resultsChannel.close(); _resultsChannel = null;
    btn.disabled = false; btn.textContent = '📡 Fetch from ESPN';
    document.getElementById('resultsScriptBox')?.remove();
    if (e.data?.type === 'espn_results_error') {
      status.textContent = '✗ ' + e.data.message; status.style.color = 'var(--red)';
      addLog('Results error: ' + e.data.message, 'err'); return;
    }
    if (e.data?.type !== 'espn_results') return;
    status.textContent = '⟳ Matching...'; status.style.color = 'var(--amber)';
    await applyESPNResults(dateStr, e.data.data || []);
    status.textContent = '✓ Applied'; status.style.color = 'var(--green)';
  };
  showConsoleScript('resultsScriptBox', 'ESPN Results', 'https://www.espn.com/mens-college-basketball/scoreboard',
    ESPN_RESULTS_SCRAPER, status, btn, '📡 Fetch from ESPN');
}

async function applyESPNResults(dateStr, espnResults) {
  try {
    const r = await store.get('archive_' + dateStr);
    if (!r) { addLog('No archive for ' + dateStr, 'warn'); return; }
    const data = JSON.parse(r.value);
    let applied = 0, skipped = 0;

    data.games.forEach(function(g) {
      const aKey = g.away.split(' ')[0].toLowerCase();
      const hKey = g.home.split(' ')[0].toLowerCase();
      const match = espnResults.find(function(er) {
        const erA = er.away.split(' ')[0].toLowerCase();
        const erH = er.home.split(' ')[0].toLowerCase();
        return (aKey === erA || er.away.toLowerCase().includes(aKey) || g.away.toLowerCase().includes(erA)) &&
               (hKey === erH || er.home.toLowerCase().includes(hKey) || g.home.toLowerCase().includes(erH));
      });
      if (!match || match.state !== 'post' || match.awayScore == null || match.homeScore == null) { skipped++; return; }

      const mktMatch = (g.market_spread || '').match(/([A-Z]+)\s+([-+]?\d+\.?\d*)/);
      const mktLine  = mktMatch ? parseFloat(mktMatch[2]) : null;
      const mktFavAbbr = mktMatch ? mktMatch[1].toUpperCase() : null;
      const favIsHome = mktFavAbbr
        ? g.home.toUpperCase().split(' ').some(function(w){ return w.slice(0,3) === mktFavAbbr.slice(0,3); })
        : match.homeScore > match.awayScore;
      const favScore = favIsHome ? match.homeScore : match.awayScore;
      const dogScore = favIsHome ? match.awayScore : match.homeScore;
      const actualMargin = favScore - dogScore;

      let atsResult = null;
      if (mktLine !== null) {
        const covered = actualMargin + mktLine;
        if (Math.abs(covered) < 0.1) atsResult = 'P';
        else if (g.verdict === 'EV_FAV') atsResult = covered > 0 ? 'W' : 'L';
        else if (g.verdict === 'EV_DOG') atsResult = covered < 0 ? 'W' : 'L';
        else atsResult = covered > 0 ? 'FAV_CVR' : 'DOG_CVR';
      }
      g.actual_away_score = match.awayScore;
      g.actual_home_score = match.homeScore;
      g.actual_margin = actualMargin;
      g.ats_result = atsResult;
      applied++;
    });

    await store.set('archive_' + dateStr, JSON.stringify(data));
    addLog('Results: ' + applied + ' matched, ' + skipped + ' skipped', applied > 0 ? 'ok' : 'warn');
    await loadArchiveDay(dateStr);
    updateSeasonRecord();
  } catch(e) { addLog('Apply results error: ' + e.message, 'err'); }
}


function showConsoleScript(boxId, label, siteUrl, script, statusEl, btn, btnText) {

  const box = document.createElement('div');
  box.id = boxId;
  box.style.cssText = 'margin-top:12px;background:var(--surface2);border:1px solid var(--green);border-radius:6px;padding:14px;';
  const safeScript = script.replace(/</g,'&lt;').replace(/>/g,'&gt;');
  box.innerHTML = `<div style="font-size:11px;font-weight:600;color:var(--green);margin-bottom:8px">📋 ${label} — 3 steps</div>
    <div style="font-size:11px;color:var(--text2);line-height:1.9;margin-bottom:10px">
      <strong style="color:var(--text)">1.</strong> Open <a href="${siteUrl}" target="_blank" style="color:var(--blue)">${siteUrl}</a> in Chrome<br>
      <strong style="color:var(--text)">2.</strong> Press <kbd style="background:var(--border2);padding:1px 5px;border-radius:3px">F12</kbd> → Console tab → paste script below → Enter<br>
      <strong style="color:var(--text)">3.</strong> Data appears here automatically ✓
    </div>
    <div style="position:relative">
      <textarea id="${boxId}_ta" readonly style="width:100%;height:52px;font-family:var(--mono);font-size:9px;background:var(--bg);color:var(--text2);border:1px solid var(--border2);border-radius:4px;padding:8px;resize:none;line-height:1.4;word-break:break-all">${script}</textarea>
      <button onclick="var ta=document.getElementById('${boxId}_ta');ta.select();document.execCommand('copy');this.textContent='✓ Copied!';this.style.color='var(--green)';var s=this;setTimeout(function(){s.textContent='Copy';s.style.color='';},2000);" style="position:absolute;top:6px;right:6px;font-family:var(--sans);font-size:10px;font-weight:600;padding:4px 10px;border-radius:4px;border:1px solid var(--border2);background:var(--surface);color:var(--text2);cursor:pointer">Copy</button>
    </div>
    <div style="margin-top:8px;font-size:10px;font-family:var(--mono);color:var(--text3)">
      ⏳ Listening... <button onclick="document.getElementById('${boxId}').remove();${btn.id?'document.getElementById(\''+btn.id+'\').disabled=false;document.getElementById(\''+btn.id+'\').textContent=\''+btnText+'\';':''}" style="margin-left:8px;font-family:var(--sans);font-size:10px;padding:2px 8px;border-radius:3px;border:1px solid var(--border2);background:transparent;color:var(--text3);cursor:pointer">✕ Cancel</button>
    </div>`;
  const card = btn.closest('.card') || btn.parentElement;
  card.appendChild(box);
  statusEl.textContent = '⏳ Awaiting paste...';
  statusEl.style.color = 'var(--amber)';
}

function syncKenpom() {
  const btn = document.getElementById('syncKenpomBtn');
  const status = document.getElementById('kenpomSyncStatus');
  btn.disabled = true; btn.textContent = '⏳ Waiting...';

  if (_kenpomChannel) { _kenpomChannel.close(); _kenpomChannel = null; }
  _kenpomChannel = new BroadcastChannel('kenpom_sync');
  _kenpomChannel.onmessage = async function(e) {
    _kenpomChannel.close(); _kenpomChannel = null;
    btn.disabled = false; btn.textContent = '⟳ Sync KenPom';
    document.getElementById('kenpomScriptBox')?.remove();
    if (e.data?.type === 'kenpom_error') {
      status.textContent = '✗ ' + e.data.message; status.style.color = 'var(--red)';
      addLog('KenPom error: ' + e.data.message, 'err'); return;
    }
    if (e.data?.type !== 'kenpom_stats') return;
    const { date, count, data } = e.data;
    _kenpomMemCache = data; _kenpomMemDate = date;
    try { await store.set('kenpom_stats_' + date, JSON.stringify(data)); } catch(err) {}
    status.textContent = '✓ ' + count + ' teams'; status.style.color = 'var(--green)';
    addLog('KenPom synced: ' + count + ' teams', 'ok');
  };

  showConsoleScript('kenpomScriptBox', 'KenPom Sync', 'https://kenpom.com', KENPOM_SCRAPER, status, btn, '⟳ Sync KenPom');
}

async function getKenpomStats() {
  const dateKey=new Date().toDateString();
  if(_kenpomMemCache && _kenpomMemDate===dateKey) return _kenpomMemCache;
  try{
    const r=await store.get('kenpom_stats_'+dateKey);
    if(r){ const d=JSON.parse(r.value); _kenpomMemCache=d; _kenpomMemDate=dateKey; return d; }
  }catch(e){}
  return null;
}

function fuzzyFind(dict,name) {
  if(!dict||!name) return null;
  if(dict[name]) return dict[name];
  const nl=name.toLowerCase().replace(/[^a-z0-9 ]/g,'');
  for(const k of Object.keys(dict)){ if(k.toLowerCase().replace(/[^a-z0-9 ]/g,'')===nl) return dict[k]; }
  for(const k of Object.keys(dict)){
    const kl=k.toLowerCase().replace(/[^a-z0-9 ]/g,'');
    if(kl.startsWith(nl.split(' ')[0])||nl.startsWith(kl.split(' ')[0])) return dict[k];
  }
  return null;
}



function espnGameToSlateText(g) {
  const sep = g.neutral ? ' vs ' : ' @ ';
  return [g.away + sep + g.home, g.event, g.time, g.spread || 'TBD', g.total || 'TBD'].join(' | ');
}

function applyESPNFilter() {
  if (!_espnRawGames.length) return;
  const tourney  = document.getElementById('filterTourney').checked;
  const oddsOnly = document.getElementById('filterOddsOnly').checked;
  const preOnly  = document.getElementById('filterPreOnly').checked;
  const filtered = _espnRawGames.filter(function(g) {
    if (tourney  && !g.isTourney)   return false;
    if (oddsOnly && !g.spread)      return false;
    if (preOnly  && g.state !== 'pre') return false;
    return true;
  });
  document.getElementById('slateInput').value = filtered.map(espnGameToSlateText).join('\n');
  document.getElementById('slateStatus').textContent = filtered.length + ' games';
  document.getElementById('espnFilterDesc').textContent = [
    tourney  ? 'tournament only' : 'all D1',
    oddsOnly ? 'lines available' : 'all lines',
    preOnly  ? 'upcoming only'  : 'all states',
  ].join(' · ');
}

function clearSlate() {
  document.getElementById('slateInput').value = '';
  _espnRawGames = [];
  document.getElementById('slateStatus').textContent = 'Cleared';
  document.getElementById('espnSlateStatus').textContent = '';
}

function parseSlateText(text) {
  return text.trim().split('\n')
    .map(function(l){ return l.trim(); })
    .filter(function(l){ return l && !l.startsWith('#'); })
    .map(function(line, i) {
      const parts = line.split('|').map(function(p){ return p.trim(); });
      const matchup = parts[0] || '';
      const neutral = matchup.includes(' vs ');
      const sides = matchup.split(neutral ? ' vs ' : ' @ ').map(function(s){ return s.trim(); });
      return {
        id: 'g' + (i + 1),
        away: sides[0] || matchup,
        home: sides[1] || '?',
        neutral_site: neutral,
        event: parts[1] || 'Unknown',
        time: parts[2] || 'TBD',
        market_spread: parts[3] || 'TBD',
        market_total: parts[4] || 'TBD',
      };
    }).filter(function(g){ return g.away && g.home; });
}

// ─── MAIN RUN ────────────────────────────────────────────────────
async function runAgent(slateOverride) {
  if(state.running) return;
  state.running=true;
  const btn=document.getElementById('mainRunBtn');
  const btnIcon=document.getElementById('runBtnIcon');
  const btnText=document.getElementById('runBtnText');
  btn.disabled=true; btnIcon.innerHTML='<span class="spinner"></span>'; btnText.textContent='Analyzing...';
  document.getElementById('lastRunChip').textContent='RUNNING';
  document.getElementById('lastRunChip').className='status-chip live';

  const cfg=await loadConfig();
  const today=new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
  addLog(`=== Agent run started: ${today} ===`,'ok');
  addLog(`Scope: ${cfg.gameScope} | EV threshold: ${cfg.evThreshold}pts | Max plays: ${cfg.maxPlays}`,'info');

  try {
    let slateGames = slateOverride ? parseSlateText(slateOverride) : null;

    // If no manual slate, try ESPN cache first, then guide user
    if (!slateGames) {
      if (_espnRawGames.length) {
        // ESPN already synced — apply current filters
        addLog('Using cached ESPN slate (' + _espnRawGames.length + ' raw games)...', 'info');
        const tourney  = document.getElementById('filterTourney')?.checked !== false;
        const oddsOnly = document.getElementById('filterOddsOnly')?.checked !== false;
        const filtered = _espnRawGames.filter(function(g) {
          if (tourney  && !g.isTourney)      return false;
          if (oddsOnly && !g.spread)         return false;
          if (g.state === 'post')            return false;
          return true;
        });
        if (!filtered.length) {
          document.getElementById('gamesContainer').innerHTML = '<div class="empty"><div class="empty-icon">📡</div>No upcoming games matching filters.<br>Adjust filters in the Game Slate tab and try again.</div>';
          btn.disabled=false; btnIcon.textContent='▶'; btnText.textContent='Run Daily Analysis'; state.running=false;
          return;
        }
        slateGames = parseSlateText(filtered.map(espnGameToSlateText).join('\n'));
        addLog('ESPN slate: ' + slateGames.length + ' games', 'ok');
      } else {
        // ESPN not synced yet — send user to sync
        document.getElementById('gamesContainer').innerHTML = '<div class="empty"><div class="empty-icon">📡</div><strong>Sync ESPN first</strong><br><br>Go to the <strong>Game Slate</strong> tab → click <strong>Sync ESPN</strong><br>to pull today\'s live slate and lines,<br>then hit Run Daily Analysis again.</div>';
        addLog('ESPN not synced — go to Game Slate tab → Sync ESPN', 'warn');
        btn.disabled=false; btnIcon.textContent='▶'; btnText.textContent='Run Daily Analysis'; state.running=false;
        switchTab('slate');
        return;
      }
    } else {
      addLog('Manual slate: ' + slateGames.length + ' games', 'info');
    }

    document.getElementById('gamesContainer').innerHTML = '<div class="empty pulsing"><div class="empty-icon">⚡</div>Computing spreads...<br>Fetching analysis from model...</div>';

    const result=await callModelAPI(cfg,today,slateGames);

    state.todayGames=result.games||[];
    state.todayPicks=result.picks||[];
    state.emailContent=result.emailContent||'';
    state.lastRun=new Date();

    // Save picks to history
    for(const pick of state.todayPicks){
      const entry={...pick,date:today,result:'Pending',timestamp:Date.now()};
      const existing=JSON.parse((await store.get('pick_history'))?.value||'[]');
      existing.push(entry);
      await store.set('pick_history',JSON.stringify(existing));
    }

    renderGames(state.todayGames, state.todayPicks, cfg);
    updateSummaryFromData(result);
    document.getElementById('emailPreview').innerHTML = buildEmailPreviewHTML(result, today);
    document.getElementById('sendEmailBtn').disabled = false;

    // Archive this run for post-mortem
    await archiveDailyRun(result, cfg, today);

    if(cfg.emailTo&&(cfg.autoEmail==='always'||(cfg.autoEmail==='ev_only'&&state.todayPicks.length>0))){
      addLog(`Auto-sending email to ${cfg.emailTo}...`,'info');
      await sendEmailDigest(true);
    }

    const ts=new Date().toLocaleTimeString();
    document.getElementById('lastRunChip').textContent=`LAST RUN ${ts}`;
    document.getElementById('lastRunChip').className='status-chip';
    addLog(`=== Run complete. ${result.games?.length||0} games, ${result.picks?.length||0} EV plays ===`,'ok');

  }catch(err){
    addLog(`ERROR: ${err.message}`,'err');
    document.getElementById('gamesContainer').innerHTML=`<div class="empty"><div class="empty-icon">⚠️</div>Error: ${err.message}</div>`;
    document.getElementById('lastRunChip').textContent='ERROR';
    document.getElementById('lastRunChip').className='status-chip';
  }
  btn.disabled=false; btnIcon.textContent='▶'; btnText.textContent='Run Daily Analysis'; state.running=false;
}

// ─── MODEL API ───────────────────────────────────────────────────
// Formula is computed in JS (deterministic math — no need to pay tokens for it).
// Model receives pre-computed spreads and only needs to: validate, add context, flag EV.

function computeSpread(g, weights) {
  const a = g.away_kenpom || {}, h = g.home_kenpom || {};
  const wt = weights || {};
  const w = function(key) { return ((wt[key] && wt[key].value) || 15) / 100; };

  // Determine who is favored by adjEM
  const aEM = parseFloat(a.adjEM) || 0, hEM = parseFloat(h.adjEM) || 0;
  const favIsHome = hEM >= aEM;
  const fav = favIsHome ? h : a, dog = favIsHome ? a : h;

  // 1. Base — adjEM differential × 0.55 (increased from 0.4 per Mar 13 post-mortem: base was systematically underestimating margins)
  const base = (parseFloat(fav.adjEM) - parseFloat(dog.adjEM)) * 0.55;

  // 2. eFG% swing
  const efg_fav_net = (parseFloat(fav.efg_off) - parseFloat(dog.efg_def));
  const efg_dog_net = (parseFloat(dog.efg_off) - parseFloat(fav.efg_def));
  const efg_swing = (efg_fav_net - efg_dog_net) * 0.7;

  // 3. TO% swing
  const to_swing = ((parseFloat(dog.to_off) - parseFloat(fav.to_off)) + (parseFloat(fav.to_def) - parseFloat(dog.to_def))) * 0.6;

  // 4. REB swing (tempo-scaled)
  const avgT = ((parseFloat(a.adjT) || 68) + (parseFloat(h.adjT) || 68)) / 2;
  const reb_swing = (parseFloat(fav.orb) - parseFloat(dog.drb)) * 0.2 * (avgT / 68);

  // 5. FT swing
  const ft_rate_swing = (parseFloat(fav.ftr_off) - parseFloat(dog.ftr_off)) / 5 * 0.8;
  const ft_pct_swing  = 0; // ft_pct not in bootstrap — skip gracefully

  // 6. Site: 0 for all tournament/neutral games. +3.0 for true home games only.
  const isTournament = !!(g.event && (g.event.includes('Tournament') || g.event.includes('Championship') || g.neutral_site || g.neutral));
  const site = isTournament ? 0 : (g.neutral_site || g.neutral ? 0 : (favIsHome ? 3.0 : -3.0));

  // 7. Recency — last-10 AdjEM vs season AdjEM gap (from KenPom /recent.php)
  // Captures tournament hot streaks (NC State 2024) and cold spells.
  // recent_adjEM > adjEM → team is playing BETTER than season average → boost
  // recent_adjEM < adjEM → team is playing WORSE → drag
  // Capped at ±4.0 pts to prevent outlier distortion
  function recencyBoost(kp) {
    const season = parseFloat(kp.adjEM) || 0;
    const recent = parseFloat(kp.recent_adjEM);
    if (isNaN(recent)) return 0; // not synced yet — silent fallback
    const gap = recent - season; // positive = hot, negative = cold
    // Scale: every 5 pts of recency gap = 1.0 pt spread adjustment
    return Math.max(-4.0, Math.min(4.0, gap * 0.20));
  }
  const fav_recency = recencyBoost(fav);
  const dog_recency = recencyBoost(dog);
  // Net recency: fav running hot vs dog running cold adds to spread
  const recency = fav_recency - dog_recency;

  // Weighted sum — context weight now drives recency; site is structural (always applied)
  const wBase = w('base'), wEFG = w('efg'), wTO = w('to'), wREB = w('reb'), wFT = w('ft'), wCtx = w('context');
  const raw = base
    + efg_swing * (wEFG / 0.15)
    + to_swing  * (wTO  / 0.15)
    + reb_swing * (wREB / 0.15)
    + (ft_rate_swing + ft_pct_swing) * (wFT / 0.15)
    + site
    + recency   * (wCtx / 0.20); // context weight scales recency impact

  // Parse market spread
  let mktNum = null, mktFavName = null;
  const mkt = (g.market_spread || g.mkt || '').trim();
  const mktMatch = mkt.match(/^([A-Z]+)\s+([-+]?\d+\.?\d*)/i);
  if (mktMatch) {
    mktFavName = mktMatch[1].toUpperCase();
    mktNum = parseFloat(mktMatch[2]);
  }

  // Convert raw to spread string (fav − dog direction)
  const modelNum = Math.round(raw * 2) / 2; // round to nearest 0.5
  const favName = favIsHome ? g.home : g.away;
  // Abbrev priority: ESPN abbrev field → smart name shortening
  function teamAbbr(name, abbr) {
    if (abbr) return abbr.toUpperCase().slice(0, 5);
    // Strip common suffixes like "Volunteers", "Commodores", etc — use school name
    const words = name.split(' ');
    // If starts with "St." or "Mt." use first two words
    if (words[0].match(/^(St\.|Mt\.|NC|UC|UNC|LSU|BYU|SMU|TCU|VCU|UAB)$/i)) return (words[0] + (words[1] || '')).toUpperCase().replace(/[^A-Z]/g,'').slice(0, 5);
    return words[0].toUpperCase().slice(0, 4);
  }
  const favAbbr = teamAbbr(favName, favIsHome ? (g.homeAbbr || g.home_abbrev) : (g.awayAbbr || g.away_abbrev));
  const modelSpread = favAbbr + ' -' + Math.abs(modelNum).toFixed(1);

  // Edge vs market
  let edge = 0;
  if (mktNum !== null && modelNum !== null) {
    // Both from fav perspective
    edge = Math.abs(modelNum) - Math.abs(mktNum);
  }

  return {
    favName, favIsHome, modelNum, modelSpread,
    mktNum, mktFavName, edge: Math.round(edge * 10) / 10,
    components: { base: +base.toFixed(2), efg: +efg_swing.toFixed(2), to: +to_swing.toFixed(2), reb: +reb_swing.toFixed(2), ft: +ft_rate_swing.toFixed(2), site, recency: +recency.toFixed(2) },
    recencyDetail: {
      fav_season_em: +(parseFloat(fav.adjEM)||0).toFixed(2),
      fav_recent_em: isNaN(parseFloat(fav.recent_adjEM)) ? null : +parseFloat(fav.recent_adjEM).toFixed(2),
      dog_season_em: +(parseFloat(dog.adjEM)||0).toFixed(2),
      dog_recent_em: isNaN(parseFloat(dog.recent_adjEM)) ? null : +parseFloat(dog.recent_adjEM).toFixed(2),
    },
    aEM: +aEM.toFixed(2), hEM: +hEM.toFixed(2),
  };
}

function evVerdict(computed, evThreshold) {
  const { edge, mktNum, modelNum } = computed;
  if (Math.abs(edge) < evThreshold) return 'PASS';
  // Model favors fav more → EV_FAV; model favors dog → EV_DOG
  if (modelNum > (mktNum || 0)) return 'EV_FAV';
  if (modelNum < (mktNum || 0)) return 'EV_DOG';
  return 'PASS';
}

async function callModelAPI(cfg, today, slateGames) {
  const apiKey = getApiKey();
  const headers = { 'Content-Type': 'application/json' };
  if (apiKey) { headers['x-api-key'] = apiKey; headers['anthropic-version'] = '2023-06-01'; headers['anthropic-dangerous-direct-browser-access'] = 'true'; }

  // Step 1: Load KenPom stats
  const allStats = await getKenpomStats();
  if (!allStats || Object.keys(allStats).length === 0) {
    addLog('KenPom not synced — go to Game Slate → Sync KenPom, then re-run for full four-factor model.', 'warn');
    // Soft fail: show warning in UI and abort gracefully
    document.getElementById('gamesContainer').innerHTML = '<div class="empty"><div class="empty-icon">📊</div>KenPom data required. Go to <strong>Game Slate</strong> tab → <strong>Sync KenPom</strong>, then run again.</div>';
    state.running = false;
    document.getElementById('mainRunBtn').disabled = false;
    document.getElementById('runBtnIcon').textContent = '▶';
    document.getElementById('runBtnText').textContent = 'Run Daily Analysis';
    return;
  }

  const enriched = slateGames.map(function(g) {
    return Object.assign({}, g, {
      away_kenpom: fuzzyFind(allStats, g.away) || {},
      home_kenpom: fuzzyFind(allStats, g.home) || {},
    });
  });
  const matched = enriched.filter(function(g) { return Object.keys(g.away_kenpom).length > 0 && Object.keys(g.home_kenpom).length > 0; }).length;
  addLog('KenPom matched ' + matched + '/' + slateGames.length + ' games', matched === slateGames.length ? 'ok' : 'warn');

  // Step 2: Compute spreads in JS — no API tokens needed for arithmetic
  const computed = enriched.map(function(g, i) {
    try { return computeSpread(g, cfg.weights); }
    catch(e) { addLog('Compute error ' + g.away + ': ' + e.message, 'warn'); return null; }
  });

  const evThreshold = parseFloat(cfg.evThreshold) || 1.5;
  const preGames = enriched.map(function(g, i) {
    const c = computed[i];
    if (!c) return null;
    const verdict = evVerdict(c, evThreshold);
    // AWAY@HOME abbreviation key — used to match model analysis JSON back to game objects
    const awayAbbr = (g.awayAbbr || g.away.split(' ')[0]).toUpperCase().slice(0, 4);
    const homeAbbr = (g.homeAbbr || g.home.split(' ')[0]).toUpperCase().slice(0, 4);
    const atKey = awayAbbr + '@' + homeAbbr;
    return {
      id: g.id || ('g' + (i+1)),
      atKey: atKey,
      away: g.away, home: g.home,
      away_record: g.away_kenpom.wl || g.awayRecord || '',
      home_record: g.home_kenpom.wl || g.homeRecord || '',
      event: g.event, time: g.time,
      neutral_site: g.neutral_site || g.neutral || false,
      market_spread: g.market_spread, market_total: g.market_total,
      model_spread: c.modelSpread,
      edge_pts: Math.abs(c.edge),
      verdict: verdict,
      play: verdict !== 'PASS' ? (verdict === 'EV_DOG' ? (c.favIsHome ? g.away : g.home) + ' +' + Math.abs(c.mktNum || 0) : c.mktFavName + ' ' + (c.mktNum || '')) : null,
      components: c.components,
      stats: {
        away_adjEM: g.away_kenpom.adjEM, home_adjEM: g.home_kenpom.adjEM,
        away_adjO: g.away_kenpom.adjOE, home_adjO: g.home_kenpom.adjOE,
        away_adjD: g.away_kenpom.adjDE, home_adjD: g.home_kenpom.adjDE,
        away_adjT: g.away_kenpom.adjT,  home_adjT: g.home_kenpom.adjT,
        away_efg_off: g.away_kenpom.efg_off, home_efg_off: g.home_kenpom.efg_off,
        away_efg_def: g.away_kenpom.efg_def, home_efg_def: g.home_kenpom.efg_def,
        away_to_off: g.away_kenpom.to_off,   home_to_off: g.home_kenpom.to_off,
        away_to_def: g.away_kenpom.to_def,   home_to_def: g.home_kenpom.to_def,
        away_orb: g.away_kenpom.orb, home_orb: g.home_kenpom.orb,
        away_drb: g.away_kenpom.drb, home_drb: g.home_kenpom.drb,
        away_ftr_off: g.away_kenpom.ftr_off, home_ftr_off: g.home_kenpom.ftr_off,
      },
    };
  }).filter(Boolean);

  const evGames = preGames.filter(function(g) { return g.verdict !== 'PASS'; })
    .sort(function(a, b) { return b.edge_pts - a.edge_pts; })
    .slice(0, cfg.maxPlays || 6);

  addLog('JS formula: ' + preGames.length + ' games computed, ' + evGames.length + ' EV plays found', 'ok');

  // Step 3: Model call — analysis only, no math
  // Send only EV games + summary of all games. Much smaller prompt.
  const summaryLines = preGames.map(function(g) {
    const c = computed[preGames.indexOf(g)];
    const rd = c && c.recencyDetail;
    const recStr = rd && rd.fav_recent_em != null
      ? ' | recency: fav ' + rd.fav_season_em + '→' + rd.fav_recent_em + ' dog ' + rd.dog_season_em + '→' + (rd.dog_recent_em != null ? rd.dog_recent_em : '?')
      : ' | recency: no_data';
    return '[' + g.atKey + '] ' + g.away + ' @ ' + g.home
      + ' | Mkt: ' + g.market_spread + ' | Model: ' + g.model_spread
      + ' | Edge: ' + (c ? c.edge.toFixed(1) : '?') + 'pts | ' + g.verdict
      + (c ? ' | base=' + c.components.base + ' efg=' + c.components.efg + ' to=' + c.components.to + ' reb=' + c.components.reb + ' recency=' + (c.components.recency || 0).toFixed(2) : '')
      + recStr;
  }).join('\n');

  const prompt = 'Today: ' + today + '. You are a Las Vegas spread analyst. The four-factor model has already computed these results:\n\n'
    + summaryLines
    + '\n\nRecency = last-10-game AdjEM vs season AdjEM. Positive = team is on a hot streak, negative = cold. This is especially important in conference tournaments where teams on runs (NC State 2024-style) dramatically outperform their season rating.\n\n'
    + 'For each game provide:\n'
    + '1. key_factors: array of 2-3 strings (include recency if significant, e.g. "On 4-game win streak, recent AdjEM +8 above season")\n'
    + '2. analysis: one sharp sentence on why model diverges from market — explicitly call out recency if it is moving the number\n'
    + '3. four_factors_edge: {efg_swing, to_swing, reb_swing, ft_swing, recency_swing, dominant_factor}\n\n'
    + 'Also write emailContent: plain-text morning digest (3-5 sentences, EV plays bolded with **)\n\n'
    + 'Use the AWAY@HOME abbreviation shown in brackets as the key for each game (e.g. "TENN@VAN"). Return ONLY compact JSON:\n'
    + '{"analyses":{"AWAY@HOME":{"key_factors":["f1","f2"],"analysis":"...", "four_factors_edge":{"efg_swing":0,"to_swing":0,"reb_swing":0,"ft_swing":0,"recency_swing":0,"dominant_factor":"eFG%"}}},"emailContent":"..."}';

  addLog('Sending analysis prompt (' + prompt.length + ' chars)...', 'info');

  const r = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST', headers,
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 4000,
      system: 'You are a sharp Las Vegas sportsbook analyst. Return only valid compact JSON, no prose, no markdown fences.',
      messages: [{ role: 'user', content: prompt }]
    })
  });
  if (!r.ok) throw new Error('API error ' + r.status + ': ' + (await r.text()).slice(0, 120));
  const d = await r.json();
  addLog('API: stop=' + d.stop_reason + ' in=' + d.usage?.input_tokens + ' out=' + d.usage?.output_tokens + ' tokens', 'ok');

  let raw = ''; for (const b of d.content || []) if (b.type === 'text') raw += b.text;
  window.__lastRawResponse = raw;
  if (!raw.trim()) throw new Error('Empty response from model');

  // Parse model analyses
  const s = raw.replace(/```json\s*/gi, '').replace(/```\s*/g, '').trim();
  const j1 = s.indexOf('{'), j2 = s.lastIndexOf('}');
  let modelOut = {};
  try { modelOut = JSON.parse(s.slice(j1, j2 + 1)); }
  catch(e) { addLog('Analysis JSON parse failed — using computed results only: ' + e.message, 'warn'); }

  const analyses = modelOut.analyses || {};

  // Merge model analysis back into pre-computed game objects
  // Primary key: atKey (AWAY@HOME abbrev) — more robust than ESPN game ID
  // Fallback: ESPN game id (for backwards compat with old archives)
  const finalGames = preGames.map(function(g) {
    const a = analyses[g.atKey] || analyses[g.id] || {};
    return Object.assign({}, g, {
      key_factors: a.key_factors || [],
      analysis: a.analysis || '',
      four_factors_edge: a.four_factors_edge || {},
      injury_notes: null,
    });
  });

  const finalPicks = evGames.map(function(g) {
    return { game_id: g.id, play: g.play, market_line: g.market_spread, model_line: g.model_spread, edge: g.edge_pts, confidence: g.edge_pts >= 3 ? 'HIGH' : g.edge_pts >= 2 ? 'MED' : 'LOW', rationale: (analyses[g.id] && analyses[g.id].analysis) || '' };
  });

  return { games: finalGames, picks: finalPicks, emailContent: modelOut.emailContent || '' };
}

function verdictClass(v){ return{EV_FAV:'ev-fav',EV_DOG:'ev-dog',EV_BOTH:'ev-both',SHARP:'ev-both',PASS:'pass'}[v]||'pass'; }
function verdictBadge(v,edge){
  const map={EV_FAV:['ev-green',`▲ LAY FAV  +${edge}pts`],EV_DOG:['ev-amber',`▼ TAKE DOG  +${edge}pts`],EV_BOTH:['ev-purple',`⚡ TWO-WAY  ${edge}pts`],SHARP:['ev-purple',`⚡ SHARP`],PASS:['ev-gray','— PASS']};
  return map[v]||['ev-gray','— PASS'];
}
function statAdv(aVal,hVal,higherIsBetter=true){
  const a=parseFloat(aVal),h=parseFloat(hVal);
  if(isNaN(a)||isNaN(h)) return['adv-n','adv-n'];
  const ag=higherIsBetter?a>h:a<h;
  return[ag?'adv-g':'adv-r',ag?'adv-r':'adv-g'];
}
